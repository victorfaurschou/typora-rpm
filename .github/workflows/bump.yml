name: bump

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild even if upstream SHAs are unchanged'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    outputs:
      result: ${{ steps.bump.outputs.result }}
    steps:
      - name: Install build tools
        run: dnf install -y rpm-build createrepo_c curl git tar

      - name: Checkout
        uses: actions/checkout@v6

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run bump.sh
        id: bump
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
              # Pass current spec version to force a Release bump
              ver=$(awk '/^Version:/ {print $2}' SPECS/typora.spec)
              result=$(./bump.sh --version "$ver")
          else
              result=$(./bump.sh)
          fi
          echo "result=$result" >> "$GITHUB_OUTPUT"
          echo "bump.sh: $result"

      - name: Commit spec changes back to main
        if: startsWith(steps.bump.outputs.result, 'rebuilt')
        run: |
          git add SPECS/typora.spec
          git commit -m "ci: ${{ steps.bump.outputs.result }} [skip ci]"
          git push

      - name: Include typora.repo in deployed artifact
        if: startsWith(steps.bump.outputs.result, 'rebuilt')
        run: cp typora.repo repo/typora.repo

      - name: Upload Pages artifact
        if: startsWith(steps.bump.outputs.result, 'rebuilt')
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./repo

  deploy:
    needs: bump
    if: startsWith(needs.bump.outputs.result, 'rebuilt')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v5
